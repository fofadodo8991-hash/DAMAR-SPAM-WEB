<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAMAR SPAM</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0f1a;
      color: #e0f7fa;
      margin: 0;
      padding: 20px 10px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: linear-gradient(135deg, #0f1a2e, #001220);
      border: 1px solid #00ff9d33;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0, 255, 157, 0.12);
    }
    h1 {
      text-align: center;
      color: #00ff9d;
      font-size: 2.4rem;
      margin: 0 0 32px;
      text-shadow: 0 0 15px #00ff9d55;
    }
    .input-section {
      margin: 24px 0;
    }
    label {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 10px;
      color: #4fc3f7;
    }
    input[type="text"] {
      width: 100%;
      padding: 16px;
      background: #0d1b2a;
      border: 1px solid #00bcd444;
      border-radius: 10px;
      color: white;
      font-size: 1.15rem;
      outline: none;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #00ff9d;
      box-shadow: 0 0 12px #00ff9d44;
    }
    .buttons {
      display: flex;
      gap: 16px;
      margin: 32px 0 16px;
    }
    .btn {
      flex: 1;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start {
      background: linear-gradient(90deg, #00c853, #00e676);
      color: black;
    }
    .btn-stop {
      background: linear-gradient(90deg, #d32f2f, #f44336);
      color: white;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    #message {
      text-align: center;
      font-size: 1.1rem;
      min-height: 1.5em;
      word-break: break-word;
    }
    .success { color: #00e676; }
    .error   { color: #f44336; }
    .info    { color: #4fc3f7; }
  </style>
</head>
<body>

<div class="container">
  <h1>DAMAR SPAM</h1>

  <div class="input-section">
    <label>TARGET UID (للبدء / السبام)</label>
    <input type="text" id="startUid" placeholder="أدخل UID لتشغيل السبام" />
  </div>

  <div class="input-section">
    <label>المدة (بالدقائق)</label>
    <input type="number" id="duration" value="5" min="1" max="1440" placeholder="مثال: 5" />
  </div>

  <div class="buttons">
    <button class="btn btn-start" onclick="startSpam()">START SPAM</button>
  </div>

  <div class="input-section" style="margin-top: 40px;">
    <label>TARGET UID (للإيقاف فقط)</label>
    <input type="text" id="stopUid" placeholder="أدخل UID لإيقاف السبام" />
  </div>

  <div class="buttons">
    <button class="btn btn-stop" onclick="stopSpam()">STOP SPAM</button>
  </div>

  <div id="message"></div>
</div>

<script>
  const API_BASE = 'http://38.190.133.136:25567';
  const msg = document.getElementById('message');

  function showMessage(text, type = 'info') {
    msg.textContent = text;
    msg.className = type;
  }

  async function sendRequest(endpoint, params = {}) {
    try {
      const query = new URLSearchParams(params).toString();
      const url = `${API_BASE}/${endpoint}${query ? '?' + query : ''}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    } catch (err) {
      console.error(err);
      throw err;
    }
  }

  async function startSpam() {
    const uid = document.getElementById('startUid').value.trim();
    const dur = document.getElementById('duration').value;

    if (!uid) {
      showMessage('أدخل UID للبدء أولاً', 'error');
      return;
    }
    if (!dur || dur < 1) {
      showMessage('أدخل مدة صحيحة', 'error');
      return;
    }

    showMessage('جاري تشغيل السبام...', 'info');

    try {
      await sendRequest('spam', { user_id: uid, duration: dur });
      showMessage(`تم إرسال أمر البدء → UID: ${uid} | ${dur} دقيقة`, 'success');
    } catch (err) {
      showMessage('تم بداء الاسبام', 'error');
    }
  }

  async function stopSpam() {
    const uid = document.getElementById('stopUid').value.trim();

    if (!uid) {
      showMessage('أدخل UID للإيقاف أولاً', 'error');
      return;
    }

    showMessage('جاري إيقاف السبام...', 'info');

    try {
      await sendRequest('stop', { user_id: uid });
      showMessage(`تم إرسال أمر الإيقاف → UID: ${uid}`, 'success');
    } catch (err) {
      showMessage('تم ايقاف الاسبام', 'error');
    }
  }
</script>

</body>
</html>
